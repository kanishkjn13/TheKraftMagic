<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login & Signup - The Kraft Magic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/account.css" />
</head>
<body>
  <div class="page-background"></div>
  
  <div class="glass-wrapper">
    <div class="form-container">
      <div class="brand-logo" onclick="window.location.href='index.html'">
        <div class="logo-circle"></div>
      </div>
      
      <div class="form-toggle">
        <button id="toggleLogin" class="active" onclick="showLogin()">Login</button>
        <button id="toggleSignup" onclick="showSignup()">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div id="loginSection" class="form-section">
        <form id="loginForm" onsubmit="return login(event)">
          <h2>Welcome Back</h2>
          <p class="subtitle">Enter your details to continue your magic journey</p>
          <div class="input-group">
            <div class="input-box">
              <input type="email" id="loginEmail" placeholder="Email Address" required />
            </div>
            <div class="input-box">
              <input type="password" id="loginPassword" placeholder="Password" required />
            </div>
          </div>
          <button type="submit" class="submit-btn">Login</button>
          <a href="#" class="forgot-link">Forgot password?</a>
        </form>
      </div>

      <!-- Signup Form -->
      <div id="signupSection" class="form-section" style="display: none;">
        <form id="signupForm" onsubmit="return signup(event)">
          <h2>Create Account</h2>
          <p class="subtitle">Join our community of handcrafted elegance</p>
          <div class="input-group">
            <div class="input-box">
              <input type="text" id="signupName" placeholder="Full Name" required />
            </div>
            <div class="input-box">
              <input type="email" id="signupEmail" placeholder="Email Address" required />
            </div>
            <div class="input-box">
              <input type="password" id="signupPassword" placeholder="Create Password" required />
            </div>
          </div>
          <button type="submit" class="submit-btn">Sign Up</button>
        </form>
      </div>

      <p id="message"></p>
      
      <div class="back-link">
        <a href="index.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to Home
        </a>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script src="js/account.js"></script>
</body>
</html>
